[tool:pytest]
# Simple pytest configuration for django-cfg
# Following KISS principles - minimal but effective

# Test discovery
testpaths = tests

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, with Django)
    slow: Slow tests (can be skipped with -m "not slow")
    django_db: Tests requiring database access

# Output options
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --durations=10

# Coverage settings (when --cov is used)
# Configured in pyproject.toml

# Django settings for tests
DJANGO_SETTINGS_MODULE = tests.settings

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
