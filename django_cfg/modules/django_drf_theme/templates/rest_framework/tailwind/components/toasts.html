{# Toast stack — driven by drfApp().toasts #}
<div class="fixed bottom-4 right-4 z-50 space-y-2" x-cloak>
  <template x-for="t in toasts" :key="t.id">
    <div x-transition.opacity
         class="flex items-center gap-2 rounded-lg border px-3 py-2 text-[13px] shadow-lg bg-card border-border">
      <span class="h-1.5 w-1.5 rounded-full" :class="t.type === 'error' ? 'bg-red-500' : 'bg-green-500'"></span>
      <span class="text-foreground" x-text="t.message"></span>
    </div>
  </template>
</div>
