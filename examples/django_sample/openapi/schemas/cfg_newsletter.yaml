                additionalProperties: {}
                description: Unspecified response body
          description: ''
  /api/newsletter/unsubscribe/:
    post:
      operationId: newsletter_unsubscribe_create
      description: Unsubscribe from a newsletter using subscription ID.
      summary: Unsubscribe from Newsletter
      tags:
      - Subscriptions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnsubscribeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UnsubscribeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UnsubscribeRequest'
        required: true
      security:
      - jwtAuth: []
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
    put:
      operationId: newsletter_unsubscribe_update
      description: Handle newsletter unsubscriptions.
      tags:
      - newsletter
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnsubscribeRequest'
          application/x-www-form-urlencoded:
            schema:
