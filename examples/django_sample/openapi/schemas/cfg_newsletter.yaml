components:
  schemas:
    BulkEmailRequest:
      type: object
      description: Simple serializer for bulk email.
      properties:
        recipients:
          type: array
          items:
            type: string
            format: email
            minLength: 1
          maxItems: 100
          minItems: 1
        subject:
          type: string
          minLength: 1
          maxLength: 255
        email_title:
          type: string
          minLength: 1
          maxLength: 255
        main_text:
          type: string
          minLength: 1
        main_html_content:
          type: string
        button_text:
          type: string
          maxLength: 100
        button_url:
          type: string
          format: uri
        secondary_text:
          type: string
      required:
      - email_title
      - main_text
      - recipients
      - subject
    EmailLog:
      type: object
      description: Serializer for EmailLog model.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user:
          type: integer
          readOnly: true
          nullable: true
          title: User Account
        user_email:
          type: string
          readOnly: true
        newsletter:
          type: integer
          readOnly: true
          nullable: true
          title: Related Newsletter
        newsletter_title:
          type: string
          readOnly: true
        recipient:
          type: string
          readOnly: true
          title: Recipient(s)
          description: Comma-separated email addresses
        subject:
          type: string
          readOnly: true
        body:
          type: string
          readOnly: true
          title: Body (HTML)
        status:
          enum:
          - pending
          - sent
          - failed
          type: string
          description: |-
            * `pending` - Pending
            * `sent` - Sent
            * `failed` - Failed
          x-spec-enum-id: 6c875617d5f34e96
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        sent_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        error_message:
          type: string
          readOnly: true
          nullable: true
      required:
      - body
      - created_at
      - error_message
      - id
      - newsletter
      - newsletter_title
      - recipient
      - sent_at
      - status
      - subject
      - user
      - user_email
    Newsletter:
      type: object
      description: Serializer for Newsletter model.
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          title: Newsletter Title
          maxLength: 255
        description:
          type: string
        is_active:
          type: boolean
          title: Active
        auto_subscribe:
          type: boolean
          title: Auto Subscribe New Users
          description: Automatically subscribe new users to this newsletter
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        subscribers_count:
          type: string
          readOnly: true
      required:
      - created_at
      - id
      - subscribers_count
      - title
      - updated_at
    NewsletterCampaign:
      type: object
      description: Serializer for NewsletterCampaign model.
      properties:
        id:
          type: integer
          readOnly: true
        newsletter:
          type: integer
        newsletter_title:
          type: string
          readOnly: true
        subject:
          type: string
          maxLength: 255
        email_title:
          type: string
          maxLength: 255
        main_text:
          type: string
        main_html_content:
          type: string
          title: HTML Content
        button_text:
          type: string
          maxLength: 100
        button_url:
          type: string
          format: uri
          maxLength: 200
        secondary_text:
          type: string
        status:
          enum:
          - draft
          - sending
          - sent
          - failed
          type: string
          description: |-
            * `draft` - Draft
            * `sending` - Sending
            * `sent` - Sent
            * `failed` - Failed
          x-spec-enum-id: a459055d142d5a82
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        sent_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        recipient_count:
          type: integer
          readOnly: true
      required:
      - created_at
      - email_title
      - id
      - main_text
      - newsletter
      - newsletter_title
      - recipient_count
      - sent_at
      - status
      - subject
    NewsletterCampaignRequest:
      type: object
      description: Serializer for NewsletterCampaign model.
      properties:
        newsletter:
          type: integer
        subject:
          type: string
          minLength: 1
          maxLength: 255
        email_title:
          type: string
          minLength: 1
          maxLength: 255
        main_text:
          type: string
          minLength: 1
        main_html_content:
          type: string
          title: HTML Content
        button_text:
          type: string
          maxLength: 100
        button_url:
          type: string
          format: uri
          maxLength: 200
        secondary_text:
          type: string
      required:
      - email_title
      - main_text
      - newsletter
      - subject
    NewsletterSubscription:
      type: object
      description: Serializer for NewsletterSubscription model.
      properties:
        id:
          type: integer
          readOnly: true
        newsletter:
          type: integer
        newsletter_title:
          type: string
          readOnly: true
        user:
          type: integer
          nullable: true
        user_email:
          type: string
          readOnly: true
        email:
          type: string
          format: email
          title: Email Address
          maxLength: 254
        is_active:
          type: boolean
          title: Active
        subscribed_at:
          type: string
          format: date-time
          readOnly: true
        unsubscribed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - email
      - id
      - newsletter
      - newsletter_title
      - subscribed_at
      - unsubscribed_at
      - user_email
    PaginatedEmailLogList:
      type: object
      required:
      - count
      - page
      - pages
      - page_size
      - has_next
      - has_previous
      - results
      properties:
        count:
          type: integer
          description: Total number of items across all pages
          example: 150
        page:
          type: integer
          description: Current page number (1-based)
          example: 2
        pages:
          type: integer
          description: Total number of pages
          example: 15
        page_size:
          type: integer
          description: Number of items per page
          example: 10
        has_next:
          type: boolean
          description: Whether there is a next page
          example: true
        has_previous:
          type: boolean
          description: Whether there is a previous page
          example: true
        next_page:
          type: integer
          nullable: true
          description: Next page number (null if no next page)
          example: 3
        previous_page:
          type: integer
          nullable: true
          description: Previous page number (null if no previous page)
          example: 1
        results:
          type: array
          items:
            $ref: '#/components/schemas/EmailLog'
          description: Array of items for current page
    PaginatedNewsletterCampaignList:
      type: object
      required:
      - count
      - page
      - pages
      - page_size
      - has_next
      - has_previous
      - results
      properties:
        count:
          type: integer
          description: Total number of items across all pages
          example: 150
        page:
          type: integer
          description: Current page number (1-based)
          example: 2
        pages:
          type: integer
          description: Total number of pages
          example: 15
        page_size:
          type: integer
          description: Number of items per page
          example: 10
        has_next:
          type: boolean
          description: Whether there is a next page
          example: true
        has_previous:
          type: boolean
          description: Whether there is a previous page
          example: true
        next_page:
          type: integer
          nullable: true
          description: Next page number (null if no next page)
          example: 3
        previous_page:
          type: integer
          nullable: true
          description: Previous page number (null if no previous page)
          example: 1
        results:
          type: array
          items:
            $ref: '#/components/schemas/NewsletterCampaign'
          description: Array of items for current page
    PaginatedNewsletterList:
      type: object
      required:
      - count
      - page
      - pages
      - page_size
      - has_next
      - has_previous
      - results
      properties:
        count:
          type: integer
          description: Total number of items across all pages
          example: 150
        page:
          type: integer
          description: Current page number (1-based)
          example: 2
        pages:
          type: integer
          description: Total number of pages
          example: 15
        page_size:
          type: integer
          description: Number of items per page
          example: 10
        has_next:
          type: boolean
          description: Whether there is a next page
          example: true
        has_previous:
          type: boolean
          description: Whether there is a previous page
          example: true
        next_page:
          type: integer
          nullable: true
          description: Next page number (null if no next page)
          example: 3
        previous_page:
          type: integer
          nullable: true
          description: Previous page number (null if no previous page)
          example: 1
        results:
          type: array
          items:
            $ref: '#/components/schemas/Newsletter'
          description: Array of items for current page
    PaginatedNewsletterSubscriptionList:
      type: object
      required:
      - count
      - page
      - pages
      - page_size
      - has_next
      - has_previous
      - results
      properties:
        count:
          type: integer
          description: Total number of items across all pages
          example: 150
        page:
          type: integer
          description: Current page number (1-based)
          example: 2
        pages:
          type: integer
          description: Total number of pages
          example: 15
        page_size:
          type: integer
          description: Number of items per page
          example: 10
        has_next:
          type: boolean
          description: Whether there is a next page
          example: true
        has_previous:
          type: boolean
          description: Whether there is a previous page
          example: true
        next_page:
