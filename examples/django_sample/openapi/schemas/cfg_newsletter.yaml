openapi: 3.0.3
info:
  title: Django CFG Sample API
  version: 1.0.0 (v1)
  description: RESTful API with modern architecture
paths:
  /api/newsletter/bulk/:
    post:
      operationId: newsletter_bulk_create
      description: Send bulk emails to multiple recipients using base email template.
      summary: Send Bulk Email
      tags:
      - Bulk Email
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkEmailRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BulkEmailRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BulkEmailRequest'
        required: true
      security:
      - jwtAuth: []
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
  /api/newsletter/campaigns/:
    get:
      operationId: newsletter_campaigns_list
      description: Get a list of all newsletter campaigns.
      summary: List Newsletter Campaigns
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Campaigns
      security:
      - jwtAuth: []
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedNewsletterCampaignList'
          description: ''
    post:
      operationId: newsletter_campaigns_create
      description: Create a new newsletter campaign.
      summary: Create Newsletter Campaign
      tags:
      - Campaigns
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewsletterCampaignRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NewsletterCampaignRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/NewsletterCampaignRequest'
        required: true
      security:
      - jwtAuth: []
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsletterCampaign'
          description: ''
  /api/newsletter/campaigns/{id}/:
    get:
      operationId: newsletter_campaigns_retrieve
      description: Retrieve details of a specific newsletter campaign.
      summary: Get Campaign Details
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Campaigns
      security:
      - jwtAuth: []
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsletterCampaign'
          description: ''
    put:
      operationId: newsletter_campaigns_update
      description: Update a newsletter campaign.
      summary: Update Campaign
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Campaigns
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewsletterCampaignRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NewsletterCampaignRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/NewsletterCampaignRequest'
        required: true
      security:
      - jwtAuth: []
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsletterCampaign'
          description: ''
    patch:
      operationId: newsletter_campaigns_partial_update
      description: Retrieve, update, or delete a newsletter campaign.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - newsletter
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedNewsletterCampaignRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedNewsletterCampaignRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedNewsletterCampaignRequest'
      security:
      - jwtAuth: []
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsletterCampaign'
          description: ''
    delete:
      operationId: newsletter_campaigns_destroy
      description: Delete a newsletter campaign.
      summary: Delete Campaign
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Campaigns
      security:
      - jwtAuth: []
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '204':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
  /api/newsletter/campaigns/send/:
    post:
      operationId: newsletter_campaigns_send_create
      description: Send a newsletter campaign to all subscribers.
      summary: Send Newsletter Campaign
      tags:
      - Campaigns
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendCampaignRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SendCampaignRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SendCampaignRequest'
        required: true
      security:
      - jwtAuth: []
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
  /api/newsletter/logs/:
    get:
      operationId: newsletter_logs_list
      description: Get a list of email sending logs.
      summary: List Email Logs
      parameters:
      - name: ordering
        required: false
