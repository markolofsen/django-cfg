components:
  schemas:
    APIKey:
      type: object
      description: API key with usage stats.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Unique identifier
        name:
          type: string
          description: Human-readable key name
          maxLength: 100
        key_value:
          type: string
          readOnly: true
          description: API key value (plain text)
        key_prefix:
          type: string
          readOnly: true
          description: Key prefix for identification
        usage_count:
          type: integer
          readOnly: true
          description: Total usage count
        is_active:
          type: boolean
          description: Is key active
        is_valid:
          type: string
          readOnly: true
        last_used:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Last usage timestamp
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Key expiration
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - is_valid
      - key_prefix
      - key_value
      - last_used
      - name
      - usage_count
    APIKeyCreate:
      type: object
      description: Create API key.
      properties:
        name:
          type: string
          description: Human-readable key name
          maxLength: 100
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Key expiration
      required:
      - name
    APIKeyCreateRequest:
      type: object
      description: Create API key.
      properties:
        name:
          type: string
          minLength: 1
          description: Human-readable key name
          maxLength: 100
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Key expiration
      required:
      - name
    APIKeyList:
      type: object
      description: Simplified API key for lists.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Unique identifier
        name:
          type: string
          description: Human-readable key name
          maxLength: 100
        key_prefix:
          type: string
          readOnly: true
          description: Key prefix for identification
        usage_count:
          type: integer
          readOnly: true
          description: Total usage count
        is_active:
          type: boolean
          description: Is key active
        is_valid:
          type: string
          readOnly: true
        last_used:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Last usage timestamp
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Key expiration
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - is_valid
      - key_prefix
      - last_used
      - name
      - usage_count
    APIKeyRequest:
      type: object
      description: API key with usage stats.
      properties:
        name:
          type: string
          minLength: 1
          description: Human-readable key name
          maxLength: 100
        is_active:
          type: boolean
          description: Is key active
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Key expiration
      required:
      - name
    Currency:
      type: object
      description: Currency with type info.
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: string
          description: Currency code (e.g., USD, BTC, ETH)
          maxLength: 10
        name:
          type: string
          description: Full currency name
          maxLength: 100
        symbol:
          type: string
          description: Currency symbol (e.g., $, ₿, Ξ)
          maxLength: 10
        currency_type:
          enum:
          - fiat
          - crypto
          type: string
          x-spec-enum-id: 1fd14ececc7d641f
          description: |-
            Type of currency

            * `fiat` - Fiat Currency
            * `crypto` - Cryptocurrency
        currency_type_display:
          type: string
          readOnly: true
        is_crypto:
          type: string
          readOnly: true
        is_fiat:
          type: string
          readOnly: true
        decimal_places:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          description: Number of decimal places for this currency
        usd_rate:
          type: number
          format: double
          description: Exchange rate to USD (1 unit of this currency = X USD)
        rate_updated_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: When the exchange rate was last updated
        is_active:
          type: boolean
          description: Whether this currency is active for payments
        min_payment_amount:
          type: number
          format: double
          description: Minimum payment amount for this currency
      required:
      - code
      - currency_type
      - currency_type_display
      - id
      - is_crypto
      - is_fiat
      - name
      - rate_updated_at
      - symbol
    CurrencyList:
      type: object
      description: Simplified currency for lists.
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: string
          description: Currency code (e.g., USD, BTC, ETH)
          maxLength: 10
        name:
          type: string
          description: Full currency name
          maxLength: 100
        currency_type:
          enum:
          - fiat
          - crypto
          type: string
          x-spec-enum-id: 1fd14ececc7d641f
          description: |-
            Type of currency

            * `fiat` - Fiat Currency
            * `crypto` - Cryptocurrency
        currency_type_display:
          type: string
          readOnly: true
        is_active:
          type: boolean
          description: Whether this currency is active for payments
      required:
      - code
      - currency_type
      - currency_type_display
      - id
      - name
    CurrencyNetwork:
      type: object
      description: Currency network with status.
      properties:
        id:
          type: integer
          readOnly: true
        currency:
          type: integer
          description: Currency this network supports
        currency_code:
          type: string
          readOnly: true
        currency_name:
          type: string
          readOnly: true
        network_code:
          type: string
          description: Network code for API integration
          maxLength: 20
        network_name:
          type: string
          description: Network name (e.g., mainnet, polygon, bsc)
          maxLength: 50
        is_active:
          type: boolean
          description: Whether this network is active
        confirmation_blocks:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          description: Number of confirmations required
      required:
      - currency
      - currency_code
      - currency_name
      - id
      - network_code
      - network_name
    EndpointGroup:
      type: object
