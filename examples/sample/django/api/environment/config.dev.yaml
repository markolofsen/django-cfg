# Development Environment Configuration
# This file is for local development

# === Core Django Settings ===
secret_key: "django-cfg-sample-dev-key-change-in-production-this-is-long-enough-now"
debug: true

# === Database ===
database:
  # url: "postgresql://postgres:postgres@localhost:5432/django_cfg_sample"
  url: "sqlite:///db/default.sqlite3"
  url_blog: "sqlite:///db/blog.sqlite3"
  url_shop: "sqlite:///db/shop.sqlite3"

# === Application URLs ===
app:
  name: "Django CFG Sample"
  logo_url: "https://reforms.ai/favicon.png"
  domain: "localhost"
  api_url: "http://localhost:8000"
  site_url: "http://localhost:3000"

# === Security Domains ===
security_domains:
  - "localhost"
  - "127.0.0.1"
  - "example.com"

# === Email ===
email:
  backend: "console"
  host: "localhost"
  port: 587
  use_tls: true
  use_ssl: false
  default_from: "Django CFG Sample <noreply@localhost.dev>"

# === Telegram Bot ===
telegram:
  bot_token: ""
  chat_id: 0

# === API Keys ===
api_keys:
  cloudflare_api_key: ""
  ngrok_api_key: ""
  openrouter_api_key: ""  # Set via OPENROUTER_API_KEY env var
  openai_api_key: ""      # Set via OPENAI_API_KEY env var
  sendgrid_api_key: ""    # Set via SENDGRID_API_KEY env var for email OTP
  
  payments:
    nowpayments_api_key: "test_nowpayments_key"           # NowPayments API key
    nowpayments_ipn_secret: "test_ipn_secret"             # NowPayments IPN secret for webhooks
    cryptapi_btc_address: "1BvBMSEYstWetqTFn5Au4m4GFg7xJaNVN2"    # Your BTC wallet address for CryptAPI
    stripe_secret_key: ""             # Stripe secret key (sk_test_... or sk_live_...)
    stripe_publishable_key: ""        # Stripe publishable key (pk_test_... or pk_live_...)
    stripe_webhook_secret: ""         # Stripe webhook endpoint secret
    cryptomus_api_key: ""             # Cryptomus API key
    cryptomus_merchant_uuid: ""       # Cryptomus merchant UUID

# === Admin Configuration ===
admin_emails:
  - "admin@localhost.dev"

twilio:
  account_sid: ""  # Main Account SID
  auth_token: ""   # Main Auth Token
  whatsapp_from: ""  # WhatsApp sandbox number
  sms_from: ""       # Your SMS number
  sendgrid_api_key: ""    # SendGrid API key for email OTP
  verify_service_sid: ""  # Verify Service for OTP
  otp_template_id: "d-******"
  otp_from_email: ""  # SendGrid verified sender email

# === Cache ===
redis_url: "redis://localhost:6379/0"

# === Security ===
ssl_redirect: false
