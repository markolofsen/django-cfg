name: django-cfg

# Django-CFG - Production: Django Group
# Services: django, rq-worker, rq-scheduler, grpc

services:
  # Django API
  django:
    build:
      context: ..
      dockerfile: docker/services/django/Dockerfile
    image: django-cfg-django:latest
    container_name: django-cfg-django
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: api.settings
    volumes:
      - "../files/django-logs:/app/logs"
      - "../files/django-media:/app/media"
      - "../projects/django:/app:rw"
    networks:
      - dokploy-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/cfg/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.djangocfg-api.rule=Host(`api.djangocfg.com`)"
      - "traefik.http.routers.djangocfg-api.entrypoints=websecure"
      - "traefik.http.routers.djangocfg-api.tls=true"
      - "traefik.http.routers.djangocfg-api.service=djangocfg-api"
      - "traefik.http.services.djangocfg-api.loadbalancer.server.port=8000"
      # Streamlit Admin (st.djangocfg.com) — direct access with WebSocket support
      - "traefik.http.routers.djangocfg-streamlit.rule=Host(`st.djangocfg.com`)"
      - "traefik.http.routers.djangocfg-streamlit.entrypoints=websecure"
      - "traefik.http.routers.djangocfg-streamlit.tls=true"
      - "traefik.http.routers.djangocfg-streamlit.service=djangocfg-streamlit"
      - "traefik.http.services.djangocfg-streamlit.loadbalancer.server.port=8501"

  # RQ Worker (Background Tasks Processor)
  rq-worker:
    image: django-cfg-django:latest
    container_name: django-cfg-rq-worker
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: api.settings
    volumes:
      - "../files/django-logs:/app/logs"
      - "../projects/django:/app:rw"
    depends_on:
      django:
        condition: service_healthy
    command: python manage.py rqworker high default low knowledge
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f rqworker > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 256M
    networks:
      - dokploy-network

  # RQ Scheduler (Scheduled Tasks - Cron-like)
  rq-scheduler:
    image: django-cfg-django:latest
    container_name: django-cfg-rq-scheduler
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: api.settings
    volumes:
      - "../files/django-logs:/app/logs"
      - "../projects/django:/app:rw"
    depends_on:
      django:
        condition: service_healthy
    command: python manage.py rqscheduler
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f rqscheduler > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 128M
    networks:
      - dokploy-network

  # gRPC Server
  grpc:
    image: django-cfg-django:latest
    container_name: django-cfg-grpc
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: api.settings
    volumes:
      - "../files/django-logs:/app/logs"
      - "../files/django-media:/app/media"
      - "../projects/django:/app:rw"
    depends_on:
      django:
        condition: service_healthy
    command: python manage.py rungrpc
    ports:
      - "50051:50051"
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=localhost:50051"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 256M
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # gRPC uses HTTP/2, so we need special configuration
      - "traefik.http.routers.djangocfg-grpc.rule=Host(`grpc.djangocfg.com`)"
      - "traefik.http.routers.djangocfg-grpc.entrypoints=websecure"
      - "traefik.http.routers.djangocfg-grpc.tls=true"
      - "traefik.http.services.djangocfg-grpc.loadbalancer.server.port=50051"
      - "traefik.http.services.djangocfg-grpc.loadbalancer.server.scheme=h2c"

networks:
  dokploy-network:
    external: true
