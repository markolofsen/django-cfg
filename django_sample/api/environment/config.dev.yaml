# Development Environment Configuration
# This file is for local development

# === Core Django Settings ===
secret_key: "django-cfg-sample-dev-key-change-in-production-this-is-long-enough-now"
debug: true

# === Database ===
database:
  # url: "postgresql://postgres:postgres@localhost:5432/django_cfg_sample"
  url: "sqlite:///db/default.sqlite3"
  url_blog: "sqlite:///db/blog.sqlite3"
  url_shop: "sqlite:///db/shop.sqlite3"

# === Application URLs ===
app:
  name: "Django CFG Sample"
  logo_url: "https://unrealos.com/favicon.png"
  domain: "localhost"
  api_url: "http://localhost:8000"
  site_url: "http://localhost:3000"

# === Email ===
email:
  backend: "console"
  host: "localhost"
  port: 587
  use_tls: true
  use_ssl: false
  default_from: "Django CFG Sample <noreply@localhost.dev>"

# === Telegram Bot ===
telegram:
  bot_token: ""
  chat_id: 0

# === LLM API Keys ===
api_keys:
  openrouter_api_key: ""  # Set via OPENROUTER_API_KEY env var
  openai_api_key: ""      # Set via OPENAI_API_KEY env var

# === Cache ===
# redis_url: "redis://localhost:6379/1"

# === Security ===
ssl_redirect: false

# === Environment Flags ===
env:
  is_docker: false
  is_dev: true
  is_prod: false
  debug: true
