# 🐳 UnrealOS Django - Core Services
# PostgreSQL Database and Django Application

services:
  
  # --------------------------------------------------------------------------
  # PostgreSQL Database (UnrealOS)
  # --------------------------------------------------------------------------
  unrealos_postgres:
    build:
      context: ./postgres/default
      dockerfile: Dockerfile
    container_name: unrealos_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: unrealos_db
      POSTGRES_USER: unrealos
      POSTGRES_PASSWORD: unrealos_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - ./volumes/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unrealos -d unrealos_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # UnrealOS Django Application
  # --------------------------------------------------------------------------
  unrealos-django:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
        VERSION: ${VERSION:-1.0.0}
        VCS_REF: ${VCS_REF:-$(git rev-parse --short HEAD 2>/dev/null || echo 'unknown')}
    container_name: unrealos_django
    restart: unless-stopped
    ports:
      - "8000:8000"  # Django port
    env_file:
      - env.production
    environment:  
      # Database
      DATABASE_URL: postgresql://unrealos:unrealos_password@unrealos_postgres:5432/unrealos_db
      
      # Redis (disabled for now)
      # REDIS_URL: redis://redis:6379/0
      # REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      
      # Application
      LOG_LEVEL: INFO
      
      # Server settings
      PORT: 8000
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
    volumes:
      # Don't mount entire /app - it overwrites Poetry venv
      - ../logs:/app/logs
      - ../static:/app/static
      - ../media:/app/media
    depends_on:
      unrealos_postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/cfg/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
