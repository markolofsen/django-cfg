openapi: 3.0.3
info:
  title: Django CFG Sample API
  version: 1.0.0 (v1)
  description: Complete API documentation for Django CFG sample project
paths:
  /api/users/activities/:
    get:
      operationId: api_users_activities_list
      description: Get a list of all user activities
      summary: List user activities
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - User Activities
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserActivityList'
          description: ''
  /api/users/activities/{id}/:
    get:
      operationId: api_users_activities_retrieve
      description: Get details of a specific activity
      summary: Get activity
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this User Activity.
        required: true
      tags:
      - User Activities
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserActivity'
          description: ''
  /api/users/users/:
    get:
      operationId: api_users_users_list
      description: Get a paginated list of all users
      summary: List users
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Users
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserListList'
          description: ''
    post:
      operationId: api_users_users_create
      description: Create a new user account
      summary: Create user
      tags:
      - Users
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
        required: true
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreate'
          description: ''
  /api/users/users/{id}/:
    get:
      operationId: api_users_users_retrieve
      description: Get detailed information about a specific user
      summary: Get user
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this User.
        required: true
      tags:
      - Users
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
          description: ''
    put:
      operationId: api_users_users_update
      description: Update user information
      summary: Update user
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this User.
        required: true
      tags:
      - Users
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserUpdate'
          description: ''
    patch:
      operationId: api_users_users_partial_update
      description: Partially update user information
      summary: Partially update user
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this User.
        required: true
      tags:
      - Users
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdateRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdateRequest'
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserUpdate'
          description: ''
    delete:
      operationId: api_users_users_destroy
      description: Delete a user account
      summary: Delete user
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this User.
        required: true
      tags:
      - Users
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '204':
          description: No response body
  /api/users/users/{id}/activate/:
    post:
      operationId: api_users_users_activate_create
      description: Activate a user account
      summary: Activate user
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this User.
        required: true
      tags:
      - Users
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserDetailRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserDetailRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/UserDetailRequest'
        required: true
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
          description: ''
  /api/users/users/{id}/activities/:
    get:
      operationId: api_users_users_activities_list
      description: Get activity log for a user
      summary: Get user activities
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this User.
        required: true
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Users
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserActivityList'
          description: ''
  /api/users/users/{id}/deactivate/:
    post:
      operationId: api_users_users_deactivate_create
      description: Deactivate a user account
      summary: Deactivate user
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this User.
        required: true
      tags:
      - Users
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserDetailRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserDetailRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/UserDetailRequest'
        required: true
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
          description: ''
  /api/users/users/{id}/profile/:
    get:
      operationId: api_users_users_profile_retrieve
      description: Get detailed profile information for a user
      summary: Get user profile
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this User.
        required: true
      tags:
      - Users
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    put:
      operationId: api_users_users_profile_update
      description: Get detailed profile information for a user
      summary: Get user profile
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this User.
        required: true
      tags:
      - Users
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserDetailRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserDetailRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/UserDetailRequest'
        required: true
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    patch:
      operationId: api_users_users_profile_partial_update
      description: Get detailed profile information for a user
      summary: Get user profile
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this User.
        required: true
      tags:
      - Users
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserDetailRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserDetailRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserDetailRequest'
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
  /api/users/users/{user_id}/activities/:
    get:
      operationId: api_users_users_activities_list_2
      description: Get a list of all user activities
      summary: List user activities
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
      - User Activities
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserActivityList'
          description: ''
  /api/users/users/{user_id}/activities/{id}/:
    get:
      operationId: api_users_users_activities_retrieve
      description: Get details of a specific activity
      summary: Get activity
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this User Activity.
        required: true
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
      - User Activities
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserActivity'
          description: ''
  /api/users/users/stats/:
    get:
      operationId: api_users_users_stats_retrieve
      description: Get comprehensive user statistics
      summary: Get user statistics
      tags:
      - Users
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserStats'
          description: ''
components:
  schemas:
    ActivityTypeEnum:
      enum:
      - login
      - logout
      - post_created
      - comment_created
      - order_placed
      - profile_updated
      type: string
      description: |-
        * `login` - Login
        * `logout` - Logout
        * `post_created` - Post Created
        * `comment_created` - Comment Created
        * `order_placed` - Order Placed
        * `profile_updated` - Profile Updated
    PaginatedUserActivityList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/UserActivity'
    PaginatedUserListList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/UserList'
    PatchedUserDetailRequest:
      type: object
      description: Serializer for user detail view.
      properties:
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        bio:
          type: string
          maxLength: 500
        location:
          type: string
          maxLength: 30
        birth_date:
          type: string
          format: date
          nullable: true
        avatar:
          type: string
          format: binary
          nullable: true
        is_public:
          type: boolean
          description: Make profile public
        email_notifications:
          type: boolean
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
    PatchedUserUpdateRequest:
      type: object
      description: Serializer for user updates.
      properties:
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        bio:
          type: string
          maxLength: 500
        location:
          type: string
          maxLength: 30
        birth_date:
          type: string
          format: date
          nullable: true
        avatar:
          type: string
          format: binary
          nullable: true
        is_public:
          type: boolean
          description: Make profile public
        email_notifications:
          type: boolean
    UserActivity:
      type: object
      description: Serializer for user activities.
      properties:
        id:
          type: integer
          readOnly: true
        activity_type:
          $ref: '#/components/schemas/ActivityTypeEnum'
        activity_type_display:
          type: string
          readOnly: true
        description:
          type: string
        ip_address:
          type: string
          nullable: true
        object_id:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
        object_type:
          type: string
          maxLength: 50
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - activity_type
      - activity_type_display
      - created_at
      - id
    UserActivityRequest:
      type: object
      description: Serializer for user activities.
      properties:
        activity_type:
          $ref: '#/components/schemas/ActivityTypeEnum'
        description:
          type: string
        ip_address:
          type: string
          nullable: true
          minLength: 1
        object_id:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
        object_type:
          type: string
          maxLength: 50
      required:
      - activity_type
    UserCreate:
      type: object
      description: Serializer for user creation.
      properties:
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
      required:
      - email
      - username
    UserCreateRequest:
      type: object
      description: Serializer for user creation.
      properties:
        username:
          type: string
          minLength: 1
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        password:
          type: string
          writeOnly: true
          minLength: 8
        password_confirm:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - email
      - password
      - password_confirm
      - username
    UserDetail:
      type: object
      description: Serializer for user detail view.
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
        email:
          type: string
          format: email
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        full_name:
          type: string
          readOnly: true
        bio:
          type: string
          maxLength: 500
        location:
          type: string
          maxLength: 30
        birth_date:
          type: string
          format: date
          nullable: true
        avatar:
          type: string
          format: uri
          nullable: true
        is_public:
          type: boolean
          description: Make profile public
        email_notifications:
          type: boolean
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        date_joined:
          type: string
          format: date-time
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        profile:
          allOf:
          - $ref: '#/components/schemas/UserProfile'
          readOnly: true
        activities:
          type: array
          items:
            $ref: '#/components/schemas/UserActivity'
          readOnly: true
      required:
      - activities
      - created_at
      - date_joined
      - email
      - full_name
      - id
      - profile
      - updated_at
      - username
    UserDetailRequest:
      type: object
      description: Serializer for user detail view.
      properties:
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        bio:
          type: string
          maxLength: 500
        location:
          type: string
          maxLength: 30
        birth_date:
          type: string
          format: date
          nullable: true
        avatar:
          type: string
          format: binary
          nullable: true
        is_public:
          type: boolean
          description: Make profile public
        email_notifications:
          type: boolean
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
      required:
      - email
    UserList:
      type: object
      description: Serializer for user list view.
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        full_name:
          type: string
          readOnly: true
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        date_joined:
          type: string
          format: date-time
          readOnly: true
      required:
      - date_joined
      - email
      - full_name
      - id
      - username
    UserProfile:
      type: object
      description: Serializer for user profiles.
      properties:
        website:
          type: string
          format: uri
          maxLength: 200
        github:
          type: string
          maxLength: 100
        twitter:
          type: string
          maxLength: 100
        linkedin:
          type: string
          maxLength: 100
        company:
          type: string
          maxLength: 100
        job_title:
          type: string
          maxLength: 100
        posts_count:
          type: integer
          readOnly: true
        comments_count:
          type: integer
          readOnly: true
        orders_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - comments_count
      - created_at
      - orders_count
      - posts_count
      - updated_at
    UserProfileRequest:
      type: object
      description: Serializer for user profiles.
      properties:
        website:
          type: string
          format: uri
          maxLength: 200
        github:
          type: string
          maxLength: 100
        twitter:
          type: string
          maxLength: 100
        linkedin:
          type: string
          maxLength: 100
        company:
          type: string
          maxLength: 100
        job_title:
          type: string
          maxLength: 100
    UserStats:
      type: object
      description: Serializer for user statistics.
      properties:
        total_users:
          type: integer
        active_users:
          type: integer
        new_users_today:
          type: integer
        new_users_this_week:
          type: integer
        new_users_this_month:
          type: integer
        top_users:
          type: array
          items:
            $ref: '#/components/schemas/UserList'
      required:
      - active_users
      - new_users_this_month
      - new_users_this_week
      - new_users_today
      - top_users
      - total_users
    UserUpdate:
      type: object
      description: Serializer for user updates.
      properties:
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        bio:
          type: string
          maxLength: 500
        location:
          type: string
          maxLength: 30
        birth_date:
          type: string
          format: date
          nullable: true
        avatar:
          type: string
          format: uri
          nullable: true
        is_public:
          type: boolean
          description: Make profile public
        email_notifications:
          type: boolean
    UserUpdateRequest:
      type: object
      description: Serializer for user updates.
      properties:
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        bio:
          type: string
          maxLength: 500
        location:
          type: string
          maxLength: 30
        birth_date:
          type: string
          format: date
          nullable: true
        avatar:
          type: string
          format: binary
          nullable: true
        is_public:
          type: boolean
          description: Make profile public
        email_notifications:
          type: boolean
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    tokenAuth:
      type: apiKey
