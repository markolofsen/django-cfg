openapi: 3.0.3
info:
  title: Django CFG Sample API
  version: 1.0.0 (v1)
  description: Complete API documentation for Django CFG sample project
paths:
  /api/shop/categories/:
    get:
      operationId: api_shop_categories_list
      description: Get a list of all shop categories
      summary: List categories
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Shop - Categories
      security:
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCategoryList'
          description: ''
  /api/shop/categories/{slug}/:
    get:
      operationId: api_shop_categories_retrieve
      description: Get details of a specific category
      summary: Get category
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - Shop - Categories
      security:
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
          description: ''
  /api/shop/orders/:
    get:
      operationId: api_shop_orders_list
      description: Get a list of orders (admin only)
      summary: List orders
      parameters:
      - in: query
        name: customer
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - cancelled
          - delivered
          - pending
          - processing
          - refunded
          - shipped
        description: |-
          * `pending` - Pending
          * `processing` - Processing
          * `shipped` - Shipped
          * `delivered` - Delivered
          * `cancelled` - Cancelled
          * `refunded` - Refunded
      tags:
      - Shop - Orders
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrderListList'
          description: ''
  /api/shop/orders/{id}/:
    get:
      operationId: api_shop_orders_retrieve
      description: Get details of a specific order
      summary: Get order
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Order.
        required: true
      tags:
      - Shop - Orders
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
          description: ''
  /api/shop/products/:
    get:
      operationId: api_shop_products_list
      description: Get a paginated list of products
      summary: List products
      parameters:
      - in: query
        name: category
        schema:
          type: integer
      - in: query
        name: is_digital
        schema:
          type: boolean
      - in: query
        name: is_featured
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - active
          - inactive
          - out_of_stock
        description: |-
          * `active` - Active
          * `inactive` - Inactive
          * `out_of_stock` - Out of Stock
      tags:
      - Shop - Products
      security:
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProductListList'
          description: ''
  /api/shop/products/{slug}/:
    get:
      operationId: api_shop_products_retrieve
      description: Get detailed information about a specific product
      summary: Get product
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - Shop - Products
      security:
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
          description: ''
  /api/shop/products/featured/:
    get:
      operationId: api_shop_products_featured_retrieve
      description: Get featured products
      summary: Get featured products
      tags:
      - Shop - Products
      security:
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
          description: ''
  /api/shop/products/stats/:
    get:
      operationId: api_shop_products_stats_retrieve
      description: Get comprehensive shop statistics
      summary: Get shop statistics
      tags:
      - Shop - Products
      security:
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopStats'
          description: ''
components:
  schemas:
    Category:
      type: object
      description: Serializer for shop categories.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
        image:
          type: string
          format: uri
          nullable: true
        parent:
          type: integer
          nullable: true
        meta_title:
          type: string
          maxLength: 60
        meta_description:
          type: string
          maxLength: 160
        products_count:
          type: integer
          readOnly: true
        children:
          type: string
          readOnly: true
        is_active:
          type: boolean
        sort_order:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - children
      - created_at
      - id
      - name
      - products_count
      - slug
      - updated_at
    OrderDetail:
      type: object
      description: Serializer for order detail view.
      properties:
        id:
          type: integer
          readOnly: true
        order_number:
          type: string
          maxLength: 50
        customer:
          type: string
          readOnly: true
        status:
          $ref: '#/components/schemas/StatusA98Enum'
        subtotal:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        tax_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        shipping_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        discount_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        total_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        billing_address:
          type: string
        shipping_address:
          type: string
        customer_notes:
          type: string
        admin_notes:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        shipped_at:
          type: string
          format: date-time
          nullable: true
        delivered_at:
          type: string
          format: date-time
          nullable: true
      required:
      - billing_address
      - created_at
      - customer
      - id
      - items
      - order_number
      - shipping_address
      - updated_at
    OrderItem:
      type: object
      description: Serializer for order items.
      properties:
        id:
          type: integer
          readOnly: true
        product:
          allOf:
          - $ref: '#/components/schemas/ProductList'
          readOnly: true
        quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        unit_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        total_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        product_name:
          type: string
          readOnly: true
        product_sku:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - product
      - product_name
      - product_sku
      - total_price
      - unit_price
    OrderList:
      type: object
      description: Serializer for order list view.
      properties:
        id:
          type: integer
          readOnly: true
        order_number:
          type: string
          maxLength: 50
        customer:
          type: string
          readOnly: true
        status:
          $ref: '#/components/schemas/StatusA98Enum'
        subtotal:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        total_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        items_count:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - customer
      - id
      - items_count
      - order_number
      - updated_at
    PaginatedCategoryList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Category'
    PaginatedOrderListList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/OrderList'
    PaginatedProductListList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/ProductList'
    ProductDetail:
      type: object
      description: Serializer for product detail view.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 200
        slug:
          type: string
          maxLength: 200
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
        short_description:
          type: string
          maxLength: 500
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        sale_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
        current_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        is_on_sale:
          type: boolean
          readOnly: true
        discount_percentage:
          type: integer
          readOnly: true
        sku:
          type: string
          maxLength: 100
        stock_quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        manage_stock:
          type: boolean
        is_in_stock:
          type: boolean
          readOnly: true
        category:
          allOf:
          - $ref: '#/components/schemas/Category'
          readOnly: true
        image:
          type: string
          format: uri
          nullable: true
        status:
          $ref: '#/components/schemas/Status50eEnum'
        is_featured:
          type: boolean
        is_digital:
          type: boolean
        meta_title:
          type: string
          maxLength: 60
        meta_description:
          type: string
          maxLength: 160
        views_count:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        sales_count:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        weight:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
          nullable: true
          description: Weight in kg
        length:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
          nullable: true
          description: Length in cm
        width:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
          nullable: true
          description: Width in cm
        height:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
          nullable: true
          description: Height in cm
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - category
      - created_at
      - current_price
      - description
      - discount_percentage
      - id
      - is_in_stock
      - is_on_sale
      - name
      - price
      - sku
      - updated_at
    ProductList:
      type: object
      description: Serializer for product list view.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 200
        slug:
          type: string
          maxLength: 200
          pattern: ^[-a-zA-Z0-9_]+$
        short_description:
          type: string
          maxLength: 500
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        sale_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
        current_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        is_on_sale:
          type: boolean
          readOnly: true
        discount_percentage:
          type: integer
          readOnly: true
        category:
          allOf:
          - $ref: '#/components/schemas/Category'
          readOnly: true
        image:
          type: string
          format: uri
          nullable: true
        status:
          $ref: '#/components/schemas/Status50eEnum'
        is_featured:
          type: boolean
        is_digital:
          type: boolean
        stock_quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        is_in_stock:
          type: boolean
          readOnly: true
        views_count:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        sales_count:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - category
      - created_at
      - current_price
      - discount_percentage
      - id
      - is_in_stock
      - is_on_sale
      - name
      - price
    ShopStats:
      type: object
      description: Serializer for shop statistics.
      properties:
        total_products:
          type: integer
        active_products:
          type: integer
        out_of_stock_products:
          type: integer
        total_orders:
          type: integer
        pending_orders:
          type: integer
        total_revenue:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        popular_products:
          type: array
          items:
            $ref: '#/components/schemas/ProductList'
        recent_orders:
          type: array
          items:
            $ref: '#/components/schemas/OrderList'
      required:
      - active_products
      - out_of_stock_products
      - pending_orders
      - popular_products
      - recent_orders
      - total_orders
      - total_products
      - total_revenue
    Status50eEnum:
      enum:
      - active
      - inactive
      - out_of_stock
      type: string
      description: |-
        * `active` - Active
        * `inactive` - Inactive
        * `out_of_stock` - Out of Stock
    StatusA98Enum:
      enum:
      - pending
      - processing
      - shipped
      - delivered
      - cancelled
      - refunded
      type: string
      description: |-
        * `pending` - Pending
        * `processing` - Processing
        * `shipped` - Shipped
        * `delivered` - Delivered
        * `cancelled` - Cancelled
        * `refunded` - Refunded
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "Token"
