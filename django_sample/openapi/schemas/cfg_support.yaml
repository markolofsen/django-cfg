openapi: 3.0.3
info:
  title: Django CFG Sample API
  version: 1.0.0 (v1)
  description: Complete API documentation for Django CFG sample project
paths:
  /api/support/tickets/:
    get:
      operationId: api_support_tickets_list
      description: ViewSet for managing support tickets.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - api
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ticket'
          description: ''
    post:
      operationId: api_support_tickets_create
      description: ViewSet for managing support tickets.
      tags:
      - api
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TicketRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TicketRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/TicketRequest'
        required: true
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
          description: ''
