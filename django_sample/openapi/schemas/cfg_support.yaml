      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedTicketRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedTicketRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedTicketRequest'
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
