        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: path
        name: ticket_uuid
        schema:
          type: string
          format: uuid
        description: UUID of the ticket
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
          description: ''
    post:
      operationId: api_support_tickets_messages_create
      description: ViewSet for managing support messages.
      parameters:
      - in: path
        name: ticket_uuid
        schema:
          type: string
          format: uuid
        description: UUID of the ticket
        required: true
      tags:
      - api
