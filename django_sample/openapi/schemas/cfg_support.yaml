components:
  schemas:
    Message:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          readOnly: true
        ticket:
          type: string
          format: uuid
          readOnly: true
        sender:
          allOf:
          - $ref: '#/components/schemas/Sender'
          readOnly: true
        is_from_author:
          type: boolean
          description: Check if this message is from the ticket author.
          readOnly: true
        text:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - is_from_author
      - sender
      - text
      - ticket
      - uuid
    MessageCreate:
      type: object
      properties:
        text:
          type: string
      required:
      - text
    MessageCreateRequest:
      type: object
      properties:
        text:
          type: string
          minLength: 1
      required:
      - text
    MessageRequest:
      type: object
      properties:
        text:
          type: string
          minLength: 1
      required:
      - text
    PatchedMessageRequest:
      type: object
      properties:
        text:
          type: string
          minLength: 1
    PatchedTicketRequest:
      type: object
      properties:
        user:
          type: integer
        subject:
          type: string
          minLength: 1
          maxLength: 255
        status:
          $ref: '#/components/schemas/StatusEnum'
    Sender:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        display_username:
          type: string
          description: Get formatted username for display.
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        avatar:
          type: string
          nullable: true
          readOnly: true
        initials:
          type: string
          description: Get user's initials for avatar fallback.
          readOnly: true
        is_staff:
          type: boolean
          readOnly: true
          title: Staff status
          description: Designates whether the user can log into this admin site.
        is_superuser:
          type: boolean
          readOnly: true
          title: Superuser status
          description: Designates that this user has all permissions without explicitly
            assigning them.
      required:
      - avatar
      - display_username
      - email
      - id
      - initials
      - is_staff
      - is_superuser
    StatusEnum:
      enum:
      - open
      - waiting_for_user
      - waiting_for_admin
      - resolved
      - closed
      type: string
      description: |-
        * `open` - Open
        * `waiting_for_user` - Waiting for User
        * `waiting_for_admin` - Waiting for Admin
        * `resolved` - Resolved
        * `closed` - Closed
    Ticket:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          readOnly: true
        user:
          type: integer
        subject:
          type: string
          maxLength: 255
        status:
          $ref: '#/components/schemas/StatusEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        unanswered_messages_count:
          type: integer
          description: Get count of unanswered messages for this specific ticket.
          readOnly: true
      required:
      - created_at
      - subject
      - unanswered_messages_count
      - user
      - uuid
    TicketRequest:
      type: object
      properties:
        user:
          type: integer
        subject:
          type: string
          minLength: 1
          maxLength: 255
        status:
          $ref: '#/components/schemas/StatusEnum'
      required:
      - subject
      - user
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "Token"
